name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0) or one of: patch, minor, major"
        required: true
        type: string
      dry_run:
        description: "Dry run (does not push changes or create release)"
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Generate token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: create-app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Configure git
        env:
          TOKEN: ${{ steps.create-app-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}"

      - name: Resolve version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -eu
          if [[ "$VERSION_INPUT" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            VERSION="$VERSION_INPUT"
          elif [[ "$VERSION_INPUT" =~ ^(patch|minor|major)$ ]]; then
            LATEST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
            LATEST_VERSION="${LATEST_TAG#v}"
            LATEST_VERSION="${LATEST_VERSION:-0.0.0}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            case "$VERSION_INPUT" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          else
            echo "::error::version must be a semver (e.g. 1.2.3) or one of: patch, minor, major" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        id: release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run: would create tag ${TAG}"
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

  update-v1-tag:
    needs: [release]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    # Only run for stable releases (pre-release suffixes are appended after a hyphen, e.g. v1.2.3-rc.1)
    if: ${{ !inputs.dry_run && !contains(needs.release.outputs.tag, '-') }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Generate token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: create-app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Configure git
        env:
          TOKEN: ${{ steps.create-app-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}"

      - name: Update v1 tag
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}"
          git tag -f v1 "$TAG"
          git push origin v1 --force
